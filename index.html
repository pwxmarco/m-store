<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Store</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        iframe {
            width: 100%;
            height: 100dvh;
            border: none;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            z-index: 9999;
        }
    </style>
</head>

<body>

<div id="loader">Loading M Store...</div>

<iframe 
    src="https://app-b0kgvq6ccmbl.appmedo.com/" 
    allowfullscreen
    sandbox="allow-same-origin allow-scripts allow-forms allow-downloads allow-popups"
    referrerpolicy="no-referrer">
</iframe>

<script>
    // Hide loader after load
    const iframe = document.querySelector("iframe");
    iframe.onload = () => {
        document.getElementById("loader").style.display = "none";
    };
</script>

</body>
</html>
